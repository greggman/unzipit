<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Unzipit Typescript Tests</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../mocha.css">
  </head>
  <body>
    <div id="mocha"></div>
    <script>
      function makePromise() {
        const info = {};
        const promise = new Promise((resolve, reject) => {
          Object.assign(info, {resolve, reject});
        });
        info.promise = promise;
        return info;
      }

      window.testsPromiseInfo = makePromise();
    </script>
    <script src="../mocha.js"></script>
    <script type="module">
    import * as chai from '../chai.js';
    window.chai = chai;

    /* global mocha */
    mocha.setup('bdd');
    mocha.fullTrace();
    mocha.timeout(10000);
    const query = Object.fromEntries(new URLSearchParams(window.location.search).entries());
    if (query.timeout !== undefined) {
      mocha.timeout(query.timeout);
    }

    const script = document.createElement('script');
    script.type = 'module';
    script.src = 'ts-test.js';
    document.head.appendChild(script);
    </script>
  </body>
</html>
